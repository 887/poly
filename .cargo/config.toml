# Pass cfg flags to all crate builds. `web_sys_unstable_apis` enables the
# WebCodecs / MediaStreamTrackProcessor / AudioData bindings on web-sys —
# required by `clients/discord/src/voice_bridge/audio_capture.rs`
# (Phase X.2 wasm audio capture loop). Stable web-sys bindings would need
# `web_sys_unstable_apis` to be removed from upstream gates first.
[target.wasm32-unknown-unknown]
rustflags = ["--cfg=web_sys_unstable_apis"]

[target.wasm32-wasip1]
rustflags = ["--cfg=web_sys_unstable_apis"]

[target.wasm32-wasip2]
rustflags = ["--cfg=web_sys_unstable_apis"]
