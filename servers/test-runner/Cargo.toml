[package]
name = "poly-test-runner"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Orchestrator that runs all Poly test servers simultaneously"

[[bin]]
name = "poly-test-runner"
path = "src/main.rs"

[dependencies]
poly-test-common = { path = "../test-common" }

# Async runtime
tokio = { workspace = true, features = [
    "rt-multi-thread",
    "net",
    "process",
    "signal",
] }

# Serialization
serde_json = { workspace = true }

# Utilities
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
reqwest = { workspace = true, features = ["json"] }

[lints]
workspace = true
