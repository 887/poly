[package]
name = "poly-server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Poly self-hosted chat server — reference implementation"

[[bin]]
name = "poly-server"
path = "src/main.rs"

[features]
default = ["db-sqlite"]
db-surreal = ["dep:surrealdb", "surrealdb?/protocol-ws", "surrealdb?/kv-surrealkv"]
db-sqlite = ["dep:sqlite"]

[dependencies]
# Async runtime
tokio = { workspace = true, features = [
    "rt-multi-thread",
    "fs",
    "io-std",
    "net",
    "process",
    "signal",
] }

# Web framework
axum = { workspace = true, features = ["ws", "macros", "multipart"] }
tower-http = { workspace = true, features = ["cors", "trace"] }
tower = { workspace = true, features = ["util"] }

# Database — one of these is active depending on feature flags.
surrealdb = { workspace = true, optional = true }
sqlite = { workspace = true, optional = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Auth (Ed25519 challenge-response, JWT sessions)
ed25519-dalek = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
jsonwebtoken = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
futures = { workspace = true }
tokio-stream = { workspace = true, features = ["sync"] }

[dev-dependencies]
tempfile = { workspace = true }
reqwest = { workspace = true, features = ["json", "multipart"] }
tokio-tungstenite = { workspace = true, features = ["native-tls"] }
futures = { workspace = true }
ed25519-dalek = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
tracing-subscriber = { workspace = true }

[lints]
workspace = true
