[package]
name = "poly-test-poly"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Test wrapper around real poly-server with seed/reset support"

[[bin]]
name = "poly-test-poly"
path = "src/main.rs"

[dependencies]
poly-test-common = { path = "../test-common" }
poly-server = { path = "../server", default-features = false, features = ["db-sqlite"] }

# Async runtime
tokio = { workspace = true, features = [
    "rt-multi-thread",
    "fs",
    "net",
    "signal",
] }

# Web framework
axum = { workspace = true, features = ["macros"] }
tower-http = { workspace = true, features = ["cors", "trace"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Utilities
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
anyhow = { workspace = true }
tempfile = { workspace = true }

[lints]
workspace = true
