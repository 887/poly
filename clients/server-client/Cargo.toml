[package]
name = "poly-server-client"
description = "Poly-server ClientBackend implementation — HTTP + WebSocket client"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
# The shared abstraction trait + types
poly-client = { workspace = true }

# HTTP client
reqwest = { workspace = true, features = ["json", "multipart"] }

# WebSocket client
tokio-tungstenite = { workspace = true, features = ["native-tls"] }
futures-util = { workspace = true }

# Cryptography (Ed25519 challenge-response auth)
ed25519-dalek = { workspace = true }
hex = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Async
tokio = { workspace = true, features = ["rt", "macros", "sync", "time"] }
tokio-stream = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }

# Utilities
chrono = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
# We spin up a real poly-server in-process for integration tests
poly-server = { path = "../../servers/server" }
axum = { workspace = true, features = ["ws", "macros", "multipart"] }
tower-http = { workspace = true, features = ["cors", "trace"] }
tempfile = { workspace = true }
rand = { workspace = true }
tracing-subscriber = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }

[lints]
workspace = true
