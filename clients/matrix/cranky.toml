# Cranky lint configuration for poly-matrix.
# `cargo cranky` respects this file (equivalent to cargo clippy but config-file driven).
# These are IN ADDITION to the workspace-level lints in the root Cargo.toml.

[deny]
warnings = true
# Safety
unsafe_code = true

# Fallible short-circuits
"clippy::unwrap_used" = true
"clippy::expect_used" = true
"clippy::panic" = true
"clippy::indexing_slicing" = true

# Code hygiene
"clippy::todo" = true
"clippy::unimplemented" = true
"clippy::dbg_macro" = true
"clippy::print_stdout" = true  # use tracing, not println!
"clippy::print_stderr" = true

# Complexity — no giant functions, no spaghetti nesting
"clippy::too_many_lines" = true       # threshold: see clippy.toml
"clippy::cognitive_complexity" = true # threshold: see clippy.toml
"clippy::too_many_arguments" = true   # threshold: see clippy.toml

[warn]
"clippy::pedantic" = true
"clippy::nursery" = true
"clippy::missing_docs_in_private_items" = false
"clippy::missing_errors_doc" = false
"clippy::must_use_candidate" = false
"clippy::module_name_repetitions" = false
