[package]
name = "poly-chat-mcp"
description = "MCP server exposing all Poly chat backends as tools"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "poly-chat-mcp"
path = "src/main.rs"

[lib]
name = "poly_chat_mcp"
path = "src/lib.rs"

[dependencies]
poly-client = { workspace = true }
poly-stoat = { workspace = true, features = ["native"] }
poly-matrix = { workspace = true, features = ["native"] }
poly-discord = { workspace = true, features = ["native", "gateway"] }
poly-teams = { workspace = true, features = ["native"] }
poly-lemmy = { workspace = true, features = ["native"] }
poly-hackernews = { workspace = true, features = ["native"] }
poly-github = { workspace = true }
poly-server-client = { workspace = true, features = ["native"] }
tokio = { workspace = true, features = [
    "rt-multi-thread",
    "fs",
    "io-std",
    "net",
    "sync",
    "time",
] }
chrono = { workspace = true }
futures-core = "0.3"
futures-util = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
rand = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
clap = { version = "4", features = ["derive"] }
sqlite = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
poly-test-discord = { path = "../../servers/test-discord" }
poly-test-teams = { path = "../../servers/test-teams" }
poly-test-lemmy = { path = "../../servers/test-lemmy" }
poly-test-hackernews = { path = "../../servers/test-hackernews" }
poly-test-stoat = { path = "../../servers/test-stoat" }
poly-test-matrix = { path = "../../servers/test-matrix" }
# Phase C — C.6 test uses the discord client directly with gateway feature
poly-discord = { workspace = true, features = ["native", "gateway"] }
axum = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "time", "sync"] }
reqwest = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
