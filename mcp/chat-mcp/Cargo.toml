[package]
name = "poly-chat-mcp"
description = "MCP server exposing all Poly chat backends as tools"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "poly-chat-mcp"
path = "src/main.rs"

[dependencies]
poly-client = { workspace = true }
poly-stoat = { workspace = true, features = ["native"] }
poly-matrix = { workspace = true, features = ["native"] }
poly-discord = { workspace = true, features = ["native"] }
poly-teams = { workspace = true, features = ["native"] }
poly-server-client = { workspace = true, features = ["native"] }
tokio = { workspace = true, features = [
    "rt-multi-thread",
    "fs",
    "io-std",
    "net",
] }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
rand = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
clap = { version = "4", features = ["derive"] }

[lints]
workspace = true
