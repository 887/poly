[package]
name = "poly-video-backend"
version.workspace = true
edition.workspace = true
publish = false

# Feature flags
#
# `web` — enables the WebCodecs + getUserMedia/getDisplayMedia backend for
#   wasm32 targets (apps/web, apps/desktop-electron renderer side).
#   Requires `--cfg web_sys_unstable_apis` in RUSTFLAGS (see .cargo/config.toml).
#   Gated by `cfg(target_arch = "wasm32")` at the module level.
#
# `native` — enables the nokhwa camera capture backend.
#   Screen capture (scap) temporarily stubbed pending libspa-sys PipeWire 1.x fix.
#   H.264 encode/decode routed via host-bridge (POST /host/video/*).
#   No openh264 dep in this crate.
#
# See docs/plans/plan-voice-video-calls.md Phase E.3/E.4/E.5/E.6.
[features]
default = []
# Web: WebCodecs + getUserMedia/getDisplayMedia. WASM only.
# Requires .cargo/config.toml: rustflags = ["--cfg", "web_sys_unstable_apis"]
web = [
    "dep:web-sys",
    "dep:wasm-bindgen",
    "dep:wasm-bindgen-futures",
    "dep:js-sys",
]
# Native: nokhwa camera + (stubbed) screen capture. Non-wasm only.
native = [
    "dep:nokhwa",
    "dep:tokio",
    "dep:poly-host-bridge",
    "dep:base64",
]

[dependencies]
# Core traits / error handling — always compiled
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
futures = { workspace = true }

# ── Native-only deps (feature = "native") ───────────────────────────────────

# nokhwa — cross-platform native camera capture (V4L2/AVFoundation/MSMF).
nokhwa = { workspace = true, optional = true }

# Tokio — async channel bridge between nokhwa's blocking capture thread and VideoInputStream.
tokio = { workspace = true, optional = true, features = [
    "rt",
    "sync",
    "macros",
] }

# poly-host-bridge — routes H.264 encode/decode to POST /host/video/*.
# `video` feature enables VideoBridgeClient and wire types. No openh264 dep here.
poly-host-bridge = { workspace = true, optional = true, features = ["video"] }

# base64 — encode frame bytes for host-bridge JSON transport.
base64 = { workspace = true, optional = true }

# ── WASM-only deps (feature = "web") ────────────────────────────────────────

# web-sys — WebCodecs + capture APIs. WebCodecs types require web_sys_unstable_apis cfg.
web-sys = { workspace = true, optional = true, features = [
    "MediaDevices",
    "MediaDeviceInfo",
    "MediaDeviceKind",
    "MediaStream",
    "MediaStreamConstraints",
    "MediaStreamTrack",
    "MediaStreamTrackState",
    "MediaTrackConstraints",
    "DisplayMediaStreamConstraints",
    "Navigator",
    "Window",
] }
wasm-bindgen = { workspace = true, optional = true }
wasm-bindgen-futures = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }

[lints]
workspace = true
