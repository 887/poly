[package]
name = "poly-stoat-voice-smoke"
description = "CLI smoke test for Stoat voice transport (Phase F / K.3)"
version.workspace = true
edition.workspace = true
license.workspace = true
# This binary is always-on (runs against the local test-stoat mock, no external credentials).
# Gate the actual run with RUN_STOAT_VOICE_SMOKE=1 env var.
# See tools/stoat-voice-smoke/README.md and TEST_HARNESS.md step 8 (K.3).

[[bin]]
name = "stoat-voice-smoke"
path = "src/main.rs"

[dependencies]
poly-stoat = { path = "../../clients/stoat", features = ["voice"] }
poly-audio-backend = { workspace = true }
poly-client = { workspace = true }
poly-test-stoat = { path = "../../servers/test-stoat" }
poly-test-common = { path = "../../servers/test-common" }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "net"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
axum = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
