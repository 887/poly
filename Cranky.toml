# Workspace-level cranky lint configuration.
# `cargo cranky` respects this file (equivalent to cargo clippy but config-file driven).
# Each key is a sequence of lint names — see https://github.com/ericseppanen/cargo-cranky

deny = [
    "warnings",
    # Safety
    "unsafe_code",

    # Fallible short-circuits
    "clippy::unwrap_used",
    "clippy::expect_used",
    "clippy::panic",
    "clippy::indexing_slicing",

    # Code hygiene
    "clippy::todo",
    "clippy::unimplemented",
    "clippy::dbg_macro",
    "clippy::print_stdout",  # use tracing, not println!
    "clippy::print_stderr",

    # Complexity — no giant functions, no spaghetti nesting
    "clippy::too_many_lines",        # threshold: see clippy.toml
    "clippy::cognitive_complexity",  # threshold: see clippy.toml
    "clippy::too_many_arguments",    # threshold: see clippy.toml
]

warn = [
    "clippy::pedantic",
    "clippy::nursery",
]

allow = [
    # Re-allow noisy pedantic findings that mostly fire on idiomatic code.
    "clippy::missing_docs_in_private_items",
    "clippy::must_use_candidate",
    "clippy::module_name_repetitions",
    "clippy::missing_errors_doc",
    "clippy::missing_panics_doc",
    "clippy::doc_markdown",
    "clippy::too_long_first_doc_paragraph",
]
