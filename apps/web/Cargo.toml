[package]
name = "poly-web"
description = "Poly web app — Dioxus fullstack with Axum"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "poly-web"
path = "src/main.rs"

[dependencies]
poly-core = { workspace = true, features = ["demo"] }
dioxus = { workspace = true, features = ["web"] }
tracing = { workspace = true }

# tracing-subscriber only on native (for local dev server if ever added)
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tracing-subscriber = { workspace = true }

[lints]
workspace = true
