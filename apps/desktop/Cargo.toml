[package]
name = "poly-desktop"
description = "Poly desktop app — Wry (webview) renderer"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "poly-desktop"
path = "src/main.rs"

[dependencies]
poly-core = { workspace = true, features = ["demo", "native-nav"] }
tracing = { workspace = true }

# Native (Wry) build
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dioxus = { workspace = true, features = ["desktop"] }
tracing-subscriber = { workspace = true }
tokio = { workspace = true }

# WASM build (used by poly-desktop-web shell via `dx serve --platform web`)
[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { workspace = true, features = ["web"] }
getrandom04-wasm = { workspace = true }

[lints]
workspace = true
