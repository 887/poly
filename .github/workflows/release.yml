# Release workflow — build all targets for tagged releases
name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  # ── Desktop builds ──────────────────────────────────────────
  desktop:
    name: Desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: poly-desktop-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: poly-desktop-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: poly-desktop-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: poly-desktop-windows-x64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli@0.7.3

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-desktop-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build desktop
        working-directory: apps/desktop
        run: dx build --platform desktop --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/dist/
            target/release/poly-desktop*

  # ── Android ─────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli@0.7.3

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-android-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Android APK
        working-directory: apps/android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: dx build --platform android --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: poly-android-apk
          path: apps/android/dist/**/*.apk

  # ── iOS ─────────────────────────────────────────────────────
  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli@0.7.3

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-ios-${{ hashFiles('**/Cargo.lock') }}

      - name: Build iOS
        working-directory: apps/ios
        run: dx build --platform ios --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: poly-ios
          path: apps/ios/dist/

  # ── Web ─────────────────────────────────────────────────────
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli@0.7.3

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-web-${{ hashFiles('**/Cargo.lock') }}

      - name: Build web
        working-directory: apps/web
        run: dx build --platform web --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: poly-web
          path: apps/web/dist/

  # ── Backup Server ───────────────────────────────────────────
  backup-server:
    name: Backup Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-server-${{ hashFiles('**/Cargo.lock') }}

      - name: Build backup server
        run: cargo build -p poly-backup-server --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: poly-backup-server
          path: target/release/poly-backup-server

  # ── Create GitHub Release ───────────────────────────────────
  release:
    name: Create Release
    needs: [desktop, android, ios, web, backup-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
