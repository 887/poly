# CI: Lint + Test
name: Lint & Test

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Clippy + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

      # ── Lint gate (all scanners now in crates/lint-gate-rules) ─────────────
      #
      # All hang-class and persona quality-gate lints (previously 9 bash scripts)
      # run as part of `cargo check -p poly-lint-gate`. The Rust scanners live in
      # crates/lint-gate-rules and are invoked by crates/lint-gate/build.rs.
      # Existing violations are grandfathered in crates/lint-gate/baseline.json;
      # NEW violations fail the build. To regenerate the baseline:
      #   cargo check --features regen-baseline -p poly-lint-gate
      #
      # Scanners included:
      #   - forbid_use_effect_spawn_cycle  (hang class #3, was forbid-use-effect-spawn-cycle.sh)
      #   - forbid_signal_write            (hang class #1, was forbid-signal-write.sh)
      #   - forbid_raw_backend_read        (hang class #4 + persona P4, was forbid-raw-backend-read.sh)
      #   - forbid_long_read_guard         (hang class #2, was forbid-long-read-guard.sh)
      #   - forbid_stale_effect_capture    (hang class #6, was forbid-stale-effect-capture.sh)
      #   - forbid_render_time_read        (hang class #7, was forbid-render-time-read.sh)
      #   - forbid_effect_self_write       (hang class #8, was forbid-effect-self-write.sh)
      #   - forbid_cross_persona_memory    (persona class P1, was forbid-cross-persona-memory.sh)
      #   - forbid_unaudited_persona_tool  (persona class P2, was forbid-unaudited-persona-tool.sh)
      #   + all original build-time scanners (action_enum_coverage, route_graph, etc.)
      - name: Lint gate (hang-class + persona quality gates via cargo check)
        run: cargo check -p poly-lint-gate

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace

