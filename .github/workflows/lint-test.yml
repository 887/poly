# CI: Lint + Test
name: Lint & Test

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Clippy + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check for use_effect+spawn+signal-write cycles
        # Phase 5 Track A of docs/plans/plan-use-spawn-once.md — fails CI if
        # anyone reintroduces the CLAUDE.md hang-class-#3 triple. Replacement:
        # crates/core/src/state/use_spawn_once.rs. Allowlist:
        # tools/scripts/use-effect-spawn-cycle-allowlist.txt.
        run: bash tools/scripts/forbid-use-effect-spawn-cycle.sh

      # Phase 5 Track A of docs/plans/plan-batched-signal.md — bans raw
      # Signal::write() in the UI crate to prevent CLAUDE.md hang class #1
      # (multi-.write() cascade) from being reintroduced. Exceptions live in
      # tools/scripts/signal-write-allowlist.txt with rationale comments.
      - name: Check for raw Signal::write in UI crate
        run: ./tools/scripts/forbid-signal-write.sh

      # Phase 5 Track A of docs/plans/plan-backend-read-timeout.md — bans raw
      # backend.read().await in the UI crate to prevent CLAUDE.md hang class #4
      # (RwLock starvation on WASM) from being reintroduced. Replacement:
      # BackendHandleExt::read_with_timeout (crates/core/src/client_manager_timeout.rs).
      # Inline-allowlist via: // poly-lint: allow raw backend.read().await — <reason>
      # File-level allowlist: tools/scripts/raw-backend-read-allowlist.txt.
      - name: Check for raw backend.read().await in UI crate
        run: ./tools/scripts/forbid-raw-backend-read.sh

      # Phase 5 Track A of docs/plans/plan-read-guard-scoping.md — bans long-scoped
      # Signal::read() guards in the UI crate to prevent CLAUDE.md hang class #2
      # (read guard live across a write) from being reintroduced.
      # Inline-allowlist via: // poly-lint: allow long-read-guard — <reason>
      # File-level allowlist: tools/scripts/long-read-guard-allowlist.txt.
      - name: Check for long-scoped Signal::read() guards in UI crate
        run: ./tools/scripts/forbid-long-read-guard.sh

  dylint:
    # Phase 5 Track B of plan-batched-signal.md + plan-use-spawn-once.md —
    # HIR-precise alternative to the regex scripts above. Belt-and-suspenders:
    # this job is continue-on-error while the lint beds in. Once proven
    # stable across two green runs on main, flip `continue-on-error` off
    # and demote the regex scripts to local-dev-only.
    # See tools/lints/poly-lints/README.md.
    name: Dylint (HIR-precise hang-class lints)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain (rustc-dev)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustc-dev, llvm-tools-preview, rust-src

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install cargo-dylint + dylint-link
        run: cargo install cargo-dylint dylint-link --locked

      - name: Build poly-lints library
        working-directory: tools/lints/poly-lints
        run: cargo build --release

      - name: Run dylint on poly-core
        env:
          DYLINT_LIBRARY_PATH: ${{ github.workspace }}/tools/lints/poly-lints/target/release
        run: cargo dylint --all -- -p poly-core

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace
