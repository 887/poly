# CI: Build desktop binaries (Linux, macOS, Windows)
name: Build Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-desktop:
    name: Desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: poly-desktop-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: poly-desktop-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: poly-desktop-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: poly-desktop-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli@0.7.3

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-desktop-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-${{ matrix.target }}-

      - name: Build desktop (Wry)
        working-directory: apps/desktop
        run: dx build --platform desktop --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/dist/
            target/release/poly-desktop*
          if-no-files-found: warn
